name: build nixos hosts

on:
  workflow_dispatch:
  push:
    branches:
      - ci

permissions:
  contents: write

jobs:
  define-matrix:
    runs-on: self-hosted
    outputs:
      hosts: ${{ steps.hosts.outputs.hosts }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/flake-checker-action@v9
      - id: hosts
        run: echo "hosts=$(/nix/var/nix/profiles/default/bin/nix eval .#colmena --apply builtins.attrNames --json)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: define-matrix
    steps:
      - run: echo $PATH
      - run: whoami
      - run: echo ${{ needs.define-matrix.outputs.hosts }}

  build:
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      matrix:
        host: ${{ fromJSON(needs.define-matrix.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build NixOS hosts
        run: /nix/var/nix/profiles/default/bin/nix develop -c colmena build --on ${{ matrix.host }}

